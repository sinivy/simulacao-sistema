<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

    <h2>Sistema Fiscal</h2>

</header>

<main class="dashboard">

    <div class="card">
        <h3>Nova Emissão</h3>
        <p>Iniciar emissão de nota fiscal.</p>

        <button onclick="novaEmissao()">
            Iniciar
        </button>
    </div>

    <div class="card">
        <h3>Automação</h3>
        <p>Processamento automatizado.</p>
    </div>

    <div class="card">
        <h3>Histórico</h3>
        <p>Demonstração de emissões.</p>
    </div>

</main>

<script src="js/dashboard.js"></script>

</body>
</html>
