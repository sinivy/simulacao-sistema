<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Fiscal</title>
        <div class="logo-area">

        <img
            src="assets/logo.png"
            alt="Logo"
            class="logo"
        >

        <h2>Automação Fiscal Inteligente</h2>

    </div>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h1>Sistema Fiscal</h1>
        <p>Emissão Automatizada de Notas</p>
        <form id="loginForm">
            <input
                 type="email"
                 id="email"
                 placeholder="E-mail"
            >
            <input
                type="password"
                id="senha"
                placeholder="Senha"
            >
            <button type="submit">
                Entrar
            </button>
        </form>
    </div>
</div>
<script src="js/login.js"></script>
</body>
</html>
